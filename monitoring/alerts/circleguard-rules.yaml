apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: circleguard-alerts
  namespace: monitoring
  labels:
    # Picked up by kube-prometheus-stack's ruleSelector
    release: prometheus
spec:
  groups:
    - name: circleguard.availability
      interval: 30s
      rules:
        # CRITICAL — service is completely down (scrape target missing for >2 min)
        - alert: CircleGuardServiceDown
          expr: |
            absent(up{app=~"auth-service|identity-service|form-service|promotion-service|dashboard-service|notification-service|gateway-service|file-service"} == 1)
          for: 2m
          labels:
            severity: critical
          annotations:
            summary: "CircleGuard service {{ $labels.app }} is down"
            description: "No healthy instance of {{ $labels.app }} has been scraped for 2 minutes."

        # WARNING — service restarted (pod restart count jumped)
        - alert: CircleGuardPodRestartLoop
          expr: |
            increase(kube_pod_container_status_restarts_total{namespace=~"circleguard-.*"}[15m]) > 3
          for: 5m
          labels:
            severity: warning
          annotations:
            summary: "Pod {{ $labels.pod }} restarting repeatedly"
            description: "{{ $labels.pod }} has restarted {{ $value | humanize }} times in 15 minutes."

    - name: circleguard.latency
      interval: 30s
      rules:
        # WARNING — P99 HTTP latency > 2s sustained for 5 min
        - alert: CircleGuardHighLatency
          expr: |
            histogram_quantile(0.99,
              sum by (app, le) (
                rate(http_server_requests_seconds_bucket{app=~".*-service"}[5m])
              )
            ) > 2
          for: 5m
          labels:
            severity: warning
          annotations:
            summary: "High P99 latency on {{ $labels.app }}"
            description: "P99 latency on {{ $labels.app }} is {{ $value | humanizeDuration }}, threshold is 2s."

        # CRITICAL — HTTP 5xx error rate > 10% sustained for 2 min
        - alert: CircleGuardHighErrorRate
          expr: |
            sum by (app) (
              rate(http_server_requests_seconds_count{status=~"5..", app=~".*-service"}[2m])
            )
            /
            sum by (app) (
              rate(http_server_requests_seconds_count{app=~".*-service"}[2m])
            ) > 0.10
          for: 2m
          labels:
            severity: critical
          annotations:
            summary: "High 5xx error rate on {{ $labels.app }}"
            description: "{{ $labels.app }} 5xx rate is {{ $value | humanizePercentage }}, threshold is 10%."

    - name: circleguard.resilience
      interval: 30s
      rules:
        # WARNING — Circuit Breaker is OPEN (value=2 in Resilience4j Micrometer)
        - alert: CircleGuardCircuitBreakerOpen
          expr: |
            resilience4j_circuitbreaker_state{state="open"} == 1
          for: 1m
          labels:
            severity: warning
          annotations:
            summary: "Circuit breaker {{ $labels.name }} is OPEN"
            description: "Circuit breaker {{ $labels.name }} on {{ $labels.app }} has been OPEN for more than 1 minute."

    - name: circleguard.jvm
      interval: 60s
      rules:
        # WARNING — JVM heap usage > 85%
        - alert: CircleGuardJvmHeapHigh
          expr: |
            sum by (app) (jvm_memory_used_bytes{area="heap", app=~".*-service"})
            /
            sum by (app) (jvm_memory_max_bytes{area="heap", app=~".*-service"}) > 0.85
          for: 5m
          labels:
            severity: warning
          annotations:
            summary: "JVM heap usage high on {{ $labels.app }}"
            description: "{{ $labels.app }} JVM heap is at {{ $value | humanizePercentage }}, threshold is 85%."
