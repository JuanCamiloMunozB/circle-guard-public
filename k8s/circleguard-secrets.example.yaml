# Template for the CircleGuard application Secret.
# 1. Copy to circleguard-secrets.yaml (gitignored — never commit the real file).
# 2. Fill in real values for each environment.
# 3. kubectl apply -f k8s/circleguard-secrets.yaml -n circleguard-dev
#    kubectl apply -f k8s/circleguard-secrets.yaml -n circleguard-stage
#    kubectl apply -f k8s/circleguard-secrets.yaml -n circleguard-master
#
# In CI/CD: Jenkins creates this secret from the jenkins-env Secret (see jenkins-secret.example.yaml)
# using the 'Create K8s Secret' stage in the Jenkinsfiles.
apiVersion: v1
kind: Secret
metadata:
  name: circleguard-secrets
type: Opaque
stringData:
  # PostgreSQL
  SPRING_DATASOURCE_PASSWORD: "<db-password>"

  # Neo4j
  SPRING_NEO4J_AUTHENTICATION_PASSWORD: "<neo4j-password>"

  # OpenLDAP
  SPRING_LDAP_PASSWORD: "<ldap-admin-password>"

  # JWT signing key — minimum 32 characters, high entropy
  JWT_SECRET: "<jwt-secret-min-32-chars>"

  # QR token signing key — minimum 32 characters, high entropy
  QR_SECRET: "<qr-secret-min-32-chars>"

  # Identity vault encryption secret and salt
  VAULT_SECRET: "<vault-encryption-secret>"
  VAULT_SALT: "<vault-salt>"

  # SMTP (notification-service)
  SPRING_MAIL_USERNAME: "<gmail-address>"
  SPRING_MAIL_PASSWORD: "<gmail-app-password>"
