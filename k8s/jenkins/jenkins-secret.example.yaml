# Template for the Jenkins credentials Secret in AKS.
# 1. Copy to jenkins-secret.yaml (gitignored — never commit the real file).
# 2. Fill in real values.
# 3. kubectl apply -f k8s/jenkins/jenkins-secret.yaml
#
# When Jenkins runs IN AKS (in-cluster), K8S_* fields can be left empty:
# the Kubernetes plugin uses the in-cluster SA automatically.
apiVersion: v1
kind: Secret
metadata:
  name: jenkins-env
  namespace: default
type: Opaque
stringData:
  JENKINS_ADMIN_USERNAME: "admin"
  JENKINS_ADMIN_PASSWORD: "changeme"

  GIT_REPO_URL: "https://github.com/JuanCamiloMunozB/circle-guard-public.git"
  GIT_BRANCH: "develop"

  DOCKERHUB_USERNAME: "juancamuba"
  DOCKERHUB_TOKEN: "<docker-hub-access-token>"
  # cat ~/.docker/config.json | base64 -w0   (Git Bash / WSL)
  DOCKERHUB_CONFIG_B64: "<base64-of-docker-config.json>"

  SONAR_HOST_URL: "https://sonarcloud.io"
  SONAR_TOKEN: "<sonarcloud-user-token>"

  # SLACK_TEAM_DOMAIN: subdomain of the workspace URL (e.g. myteam from myteam.slack.com)
  SLACK_WEBHOOK_URL: "https://hooks.slack.com/services/TXXXXXXXX/BXXXXXXXX/xxxxxxxx"
  SLACK_TEAM_DOMAIN: "<workspace-subdomain>"

  GITHUB_PAT: "<github-pat-with-repo-write>"

  # Leave all K8S_* empty when Jenkins runs in AKS (in-cluster SA is used automatically).
  K8S_API_SERVER: ""
  K8S_SA_TOKEN: ""
  K8S_SA_CREDENTIALS_ID: ""
  K8S_API_CA_CERT: ""
