apiVersion: apps/v1
kind: Deployment
metadata:
  name: jenkins
  namespace: default
spec:
  replicas: 1
  selector:
    matchLabels:
      app: jenkins
  template:
    metadata:
      labels:
        app: jenkins
    spec:
      serviceAccountName: jenkins
      # fsGroup 1000 = jenkins user inside the container; ensures the PVC is writable.
      securityContext:
        fsGroup: 1000
        runAsUser: 1000
      containers:
        - name: jenkins
          # Custom image built from jenkins/config/Dockerfile.jenkins.
          # Build + push once with jenkins/scripts/build-push-controller.sh before deploying.
          image: docker.io/circleguard/jenkins-controller:lts
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 8080
            - name: agent
              containerPort: 50000
          # All credentials and config come from the jenkins-env Secret (gitignored).
          # Create it with: kubectl apply -f k8s/jenkins/jenkins-secret.yaml
          envFrom:
            - secretRef:
                name: jenkins-env
          # In-cluster Jenkins URL (agents use this to reach the controller).
          env:
            - name: JENKINS_URL
              value: "http://jenkins.default.svc.cluster.local:8080/"
          resources:
            requests:
              cpu: "500m"
              memory: "1Gi"
            limits:
              cpu: "1500m"
              memory: "2Gi"
          volumeMounts:
            - name: jenkins-home
              mountPath: /var/jenkins_home
            # casc.yaml mounted from ConfigMap — single source of truth is jenkins/config/casc.yaml.
            # Create the ConfigMap with: deploy-jenkins-aks.sh (or manually, see that script).
            - name: casc-config
              mountPath: /var/jenkins_home/casc.yaml
              subPath: casc.yaml
              readOnly: true
          readinessProbe:
            httpGet:
              path: /login
              port: 8080
            initialDelaySeconds: 60
            periodSeconds: 10
            failureThreshold: 6
          livenessProbe:
            httpGet:
              path: /login
              port: 8080
            initialDelaySeconds: 120
            periodSeconds: 20
            failureThreshold: 5
      volumes:
        - name: jenkins-home
          persistentVolumeClaim:
            claimName: jenkins-home
        - name: casc-config
          configMap:
            name: jenkins-casc
