apiVersion: v1
kind: Service
metadata:
  name: jenkins
  namespace: default
spec:
  type: LoadBalancer
  selector:
    app: jenkins
  ports:
    - name: http
      port: 8080
      targetPort: 8080
    # JNLP port for permanent agent connections (local-kaniko-jc / local-kaniko-jm)
    - name: agent
      port: 50000
      targetPort: 50000
