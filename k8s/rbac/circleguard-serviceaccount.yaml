# Minimal ServiceAccount for CircleGuard application pods.
# Pods only need to read their own ConfigMap and Secret — nothing else.
# Apply per namespace:
#   kubectl apply -f k8s/rbac/circleguard-serviceaccount.yaml -n circleguard-dev
#   kubectl apply -f k8s/rbac/circleguard-serviceaccount.yaml -n circleguard-stage
#   kubectl apply -f k8s/rbac/circleguard-serviceaccount.yaml -n circleguard-master
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: circleguard-sa
automountServiceAccountToken: false
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: circleguard-app-role
rules:
  - apiGroups: [""]
    resources: ["configmaps"]
    resourceNames: ["circleguard-config"]
    verbs: ["get"]
  - apiGroups: [""]
    resources: ["secrets"]
    resourceNames: ["circleguard-secrets"]
    verbs: ["get"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: circleguard-app-rolebinding
subjects:
  - kind: ServiceAccount
    name: circleguard-sa
roleRef:
  kind: Role
  name: circleguard-app-role
  apiGroup: rbac.authorization.k8s.io
