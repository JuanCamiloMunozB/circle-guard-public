# cert-manager ClusterIssuer using self-signed certificates for demo/dev.
# Prerequisite: cert-manager installed:
#   helm repo add jetstack https://charts.jetstack.io
#   helm repo update
#   helm upgrade --install cert-manager jetstack/cert-manager \
#     --namespace cert-manager --create-namespace \
#     --set installCRDs=true
---
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: selfsigned-issuer
spec:
  selfSigned: {}
---
# Root CA certificate — used as the trust anchor for all services
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: circleguard-ca
  namespace: cert-manager
spec:
  isCA: true
  commonName: circleguard-ca
  secretName: circleguard-ca-secret
  privateKey:
    algorithm: ECDSA
    size: 256
  issuerRef:
    name: selfsigned-issuer
    kind: ClusterIssuer
    group: cert-manager.io
---
# CA-backed issuer for all CircleGuard Ingress resources
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: circleguard-ca-issuer
spec:
  ca:
    secretName: circleguard-ca-secret
