apiVersion: v1
kind: ConfigMap
metadata:
  name: form-service-config
data:
  SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/circleguard_form
  SPRING_DATASOURCE_USERNAME: admin
  SPRING_DATASOURCE_PASSWORD: password
  SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:9092
  MANAGEMENT_HEALTH_PROBES_ENABLED: "true"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: form-service
  labels:
    app: form-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: form-service
  template:
    metadata:
      labels:
        app: form-service
    spec:
      initContainers:
        - name: wait-for-postgres
          image: busybox:1.36
          command: ['sh', '-c', 'until nc -z -w 2 postgres 5432; do echo "Waiting for postgres..."; sleep 3; done']
        - name: wait-for-kafka
          image: busybox:1.36
          command: ['sh', '-c', 'until nc -z -w 2 kafka 9092; do echo "Waiting for kafka..."; sleep 3; done']
      containers:
        - name: form-service
          image: circleguard/form-service:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8086
          envFrom:
            - configMapRef:
                name: form-service-config
          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: 8086
            initialDelaySeconds: 45
            periodSeconds: 10
            failureThreshold: 10
          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: 8086
            initialDelaySeconds: 90
            periodSeconds: 20
            failureThreshold: 5
---
apiVersion: v1
kind: Service
metadata:
  name: form-service
spec:
  selector:
    app: form-service
  ports:
    - port: 8086
      targetPort: 8086
