apiVersion: v1
kind: ConfigMap
metadata:
  name: dashboard-service-config
data:
  SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/circleguard_dashboard
  SPRING_DATASOURCE_USERNAME: admin
  SPRING_DATASOURCE_PASSWORD: password
  PROMOTION_API_URL: http://promotion-service:8088
  MANAGEMENT_HEALTH_PROBES_ENABLED: "true"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: dashboard-service
  labels:
    app: dashboard-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: dashboard-service
  template:
    metadata:
      labels:
        app: dashboard-service
    spec:
      initContainers:
        - name: wait-for-postgres
          image: busybox:1.36
          command: ['sh', '-c', 'until nc -z -w 2 postgres 5432; do echo "Waiting for postgres..."; sleep 3; done']
        - name: wait-for-promotion
          image: busybox:1.36
          command: ['sh', '-c', 'until nc -z -w 2 promotion-service 8088; do echo "Waiting for promotion-service..."; sleep 3; done']
      containers:
        - name: dashboard-service
          image: circleguard/dashboard-service:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8084
          envFrom:
            - configMapRef:
                name: dashboard-service-config
          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: 8084
            initialDelaySeconds: 45
            periodSeconds: 10
            failureThreshold: 10
          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: 8084
            initialDelaySeconds: 90
            periodSeconds: 20
            failureThreshold: 5
---
apiVersion: v1
kind: Service
metadata:
  name: dashboard-service
spec:
  selector:
    app: dashboard-service
  ports:
    - port: 8084
      targetPort: 8084
