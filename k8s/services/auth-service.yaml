apiVersion: v1
kind: ConfigMap
metadata:
  name: auth-service-config
data:
  SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/circleguard_auth
  SPRING_DATASOURCE_USERNAME: admin
  SPRING_DATASOURCE_PASSWORD: password
  SPRING_LDAP_URLS: ldap://ldap:389
  SPRING_LDAP_BASE: dc=circleguard,dc=edu
  SPRING_LDAP_USERNAME: cn=admin,dc=circleguard,dc=edu
  SPRING_LDAP_PASSWORD: admin
  JWT_SECRET: my-super-secret-dev-key-32-chars-long-12345678
  JWT_EXPIRATION: "3600000"
  QR_SECRET: my-qr-secret-key-for-dev-1234567890
  QR_EXPIRATION: "300"
  IDENTITY_API_URL: http://identity-service:8083
  MANAGEMENT_HEALTH_PROBES_ENABLED: "true"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: auth-service
  labels:
    app: auth-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: auth-service
  template:
    metadata:
      labels:
        app: auth-service
    spec:
      initContainers:
        - name: wait-for-postgres
          image: busybox:1.36
          command: ['sh', '-c', 'until nc -z -w 2 postgres 5432; do echo "Waiting for postgres..."; sleep 3; done']
        - name: wait-for-ldap
          image: busybox:1.36
          command: ['sh', '-c', 'until nc -z -w 2 ldap 389; do echo "Waiting for ldap..."; sleep 3; done']
      containers:
        - name: auth-service
          image: circleguard/auth-service:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8180
          envFrom:
            - configMapRef:
                name: auth-service-config
          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: 8180
            initialDelaySeconds: 45
            periodSeconds: 10
            failureThreshold: 10
          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: 8180
            initialDelaySeconds: 90
            periodSeconds: 20
            failureThreshold: 5
---
apiVersion: v1
kind: Service
metadata:
  name: auth-service
spec:
  selector:
    app: auth-service
  ports:
    - port: 8180
      targetPort: 8180
