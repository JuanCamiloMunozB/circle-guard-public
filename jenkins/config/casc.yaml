# Jenkins Configuration as Code.
# Loaded on startup via CASC_JENKINS_CONFIG=/var/jenkins_home/casc.yaml.
# Variables ${...} are resolved from the container env (populated from .env
# by docker-compose.jenkins.yml).

jenkins:
  systemMessage: "CircleGuard CI — managed via JCasC"
  numExecutors: 4
  mode: NORMAL
  scmCheckoutRetryCount: 2
  remotingSecurity:
    enabled: true
  securityRealm:
    local:
      allowsSignup: false
      users:
        - id: "${JENKINS_ADMIN_USERNAME}"
          password: "${JENKINS_ADMIN_PASSWORD}"
  authorizationStrategy:
    loggedInUsersCanDoAnything:
      allowAnonymousRead: false

credentials:
  system:
    domainCredentials:
      - credentials:
          - string:
              scope: GLOBAL
              id: "k8s-sa-token"
              description: "Kubernetes jenkins ServiceAccount token (generated by setup-k8s-jenkins.sh)"
              secret: "${K8S_SA_TOKEN}"
          - usernamePassword:
              scope: GLOBAL
              id: "dockerhub-creds"
              description: "Docker Hub credentials for the 'circleguard' org (public repos). Used by Kaniko in the dev local agent."
              username: "${DOCKERHUB_USERNAME}"
              password: "${DOCKERHUB_TOKEN}"
          - file:
              scope: GLOBAL
              id: "dockerhub-config-json"
              description: "Docker Hub config.json (base64 of {auths: {index.docker.io/v1/: {auth: ...}}}). Mounted by Kaniko in stage/master pod templates."
              file: "${DOCKERHUB_CONFIG_JSON_PATH}"

jenkins:
  clouds:
    - kubernetes:
        name: "aks-cg"
        # Resolved from env at startup; set to https://<aks-fqdn> after `az aks get-credentials`.
        serverUrl: "${K8S_API_SERVER}"
        # Skip the CA check ONLY if the value below is empty; otherwise paste the cluster CA here.
        skipTlsVerify: false
        serverCertificate: "${K8S_API_CA_CERT:-}"
        # Default namespace where the ephemeral agent pods spawn. Override per-pipeline if needed.
        namespace: "circleguard-stage"
        credentialsId: "k8s-sa-token"
        # Agent pods inherit the in-repo template (jenkins/podtemplates/kaniko-build-agent.yaml).
        jenkinsUrl: "http://jenkins.default.svc.cluster.local:8080"
        connectTimeout: 30
        readTimeout: 30
        containerCapStr: "4"
        maxRequestsPerHostStr: "32"

unclassified:
  location:
    url: "http://localhost:8080/"

jobs:
  - script: |
      pipelineJob('circleguard-dev') {
          definition {
              cpsScm {
                  scm {
                      git {
                          remote { url("${GIT_REPO_URL}") }
                          branch("${GIT_BRANCH}")
                      }
                  }
                  scriptPath('jenkins/Jenkinsfile.dev')
              }
          }
      }
  - script: |
      pipelineJob('circleguard-stage') {
          definition {
              cpsScm {
                  scm {
                      git {
                          remote { url("${GIT_REPO_URL}") }
                          branch("${GIT_BRANCH}")
                      }
                  }
                  scriptPath('jenkins/Jenkinsfile.stage')
              }
          }
      }
  - script: |
      pipelineJob('circleguard-master') {
          definition {
              cpsScm {
                  scm {
                      git {
                          remote { url("${GIT_REPO_URL}") }
                          branch("${GIT_BRANCH}")
                      }
                  }
                  scriptPath('jenkins/Jenkinsfile.master')
              }
          }
      }
