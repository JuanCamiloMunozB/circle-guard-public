# Jenkins Configuration as Code.
# Loaded on startup via CASC_JENKINS_CONFIG=/var/jenkins_home/casc.yaml.
# Variables ${...} are resolved from the container env (populated from .env
# by docker-compose.jenkins.yml).

jenkins:
  systemMessage: "CircleGuard CI — managed via JCasC"
  numExecutors: 4
  mode: NORMAL
  scmCheckoutRetryCount: 2
  remotingSecurity:
    enabled: true
  securityRealm:
    local:
      allowsSignup: false
      users:
        - id: "${JENKINS_ADMIN_USERNAME}"
          password: "${JENKINS_ADMIN_PASSWORD}"
  authorizationStrategy:
    loggedInUsersCanDoAnything:
      allowAnonymousRead: false

credentials:
  system:
    domainCredentials:
      - credentials:
          - usernamePassword:
              scope: GLOBAL
              id: "dockerhub"
              description: "Docker Hub credentials (push images)"
              username: "${DOCKERHUB_USERNAME}"
              password: "${DOCKERHUB_PASSWORD}"
          - string:
              scope: GLOBAL
              id: "github-token"
              description: "GitHub token (push tags, create releases)"
              secret: "${GIT_TOKEN}"
          - string:
              scope: GLOBAL
              id: "k8s-sa-token"
              description: "Kubernetes jenkins ServiceAccount token (generated by setup-k8s-jenkins.sh)"
              secret: "${K8S_SA_TOKEN}"

unclassified:
  location:
    url: "http://localhost:8080/"

jobs:
  - script: |
      pipelineJob('circleguard-dev') {
          definition {
              cpsScm {
                  scm {
                      git {
                          remote { url("${GIT_REPO_URL}") }
                          branch("${GIT_BRANCH}")
                      }
                  }
                  scriptPath('jenkins/Jenkinsfile.dev')
              }
          }
      }
  - script: |
      pipelineJob('circleguard-stage') {
          definition {
              cpsScm {
                  scm {
                      git {
                          remote { url("${GIT_REPO_URL}") }
                          branch("${GIT_BRANCH}")
                      }
                  }
                  scriptPath('jenkins/Jenkinsfile.stage')
              }
          }
      }
  - script: |
      pipelineJob('circleguard-master') {
          definition {
              cpsScm {
                  scm {
                      git {
                          remote { url("${GIT_REPO_URL}") }
                          branch("${GIT_BRANCH}")
                      }
                  }
                  scriptPath('jenkins/Jenkinsfile.master')
              }
          }
      }
