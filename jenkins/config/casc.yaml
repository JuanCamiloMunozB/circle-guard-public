# Jenkins Configuration as Code.
# Loaded on startup via CASC_JENKINS_CONFIG=/var/jenkins_home/casc.yaml.
# All ${VAR} references are resolved from the container environment, which
# docker-compose.jenkins.yml populates from the project-root .env file.
#
# IMPORTANT: this file has a SINGLE top-level `jenkins:` key.
# Splitting it into two `jenkins:` blocks causes the second to silently
# overwrite the first in YAML — every setting above would be lost.

jenkins:
  systemMessage: "CircleGuard CI — managed via JCasC"
  # Controller runs no builds itself. All work routes to permanent agents
  # (local-kaniko-*) or ephemeral AKS pods (cloud aks-cg).
  numExecutors: 0
  mode: NORMAL
  scmCheckoutRetryCount: 2
  remotingSecurity:
    enabled: true

  securityRealm:
    local:
      allowsSignup: false
      users:
        - id: "${JENKINS_ADMIN_USERNAME}"
          password: "${JENKINS_ADMIN_PASSWORD}"

  authorizationStrategy:
    loggedInUsersCanDoAnything:
      allowAnonymousRead: false

  # Permanent agent — the developer workstation that runs Kaniko builds for dev.
  # Whoever is doing dev work connects their machine once via the JNLP command at:
  #   Jenkins UI → Manage Jenkins → Nodes → local-kaniko → Launch agent
  nodes:
    - permanent:
        name: "local-kaniko"
        labelString: "local-kaniko"
        # Must be on WSL2 native filesystem (ext4), NOT on /mnt/c/ (NTFS).
        # NTFS does not support execute bits or named pipes required by the durable-task plugin.
        # Change this to $HOME/jenkins-agent of the WSL user running the agent process.
        remoteFS: "/var/lib/jenkins-agent"
        numExecutors: 2
        mode: EXCLUSIVE
        launcher:
          inbound:
            workDirSettings:
              disabled: false
              internalDir: "remoting"
              failIfWorkDirIsMissing: false
        retentionStrategy: "always"

  clouds:
    - kubernetes:
        name: "aks-cg"
        # Empty = in-cluster SA (when Jenkins runs IN AKS).
        # Set to https://<aks-fqdn> only for local docker-compose pointing at AKS.
        serverUrl: "${K8S_API_SERVER:-}"
        skipTlsVerify: false
        serverCertificate: "${K8S_API_CA_CERT:-}"
        namespace: "circleguard-stage"
        # Empty = in-cluster SA token. Set to 'k8s-sa-token' for external access.
        credentialsId: "${K8S_SA_CREDENTIALS_ID:-}"
        # In-cluster URL when Jenkins runs in AKS; override for local docker-compose.
        jenkinsUrl: "${JENKINS_URL:-http://jenkins.default.svc.cluster.local:8080/}"
        connectTimeout: 30
        readTimeout: 30
        containerCapStr: "4"
        maxRequestsPerHostStr: "32"

credentials:
  system:
    domainCredentials:
      - credentials:
          - string:
              scope: GLOBAL
              id: "k8s-sa-token"
              description: "Kubernetes jenkins SA token. Needed only when Jenkins runs outside AKS. Leave K8S_SA_TOKEN empty for in-cluster deployments."
              secret: "${K8S_SA_TOKEN:-}"
          - usernamePassword:
              scope: GLOBAL
              id: "dockerhub-creds"
              description: "Docker Hub credentials for the circleguard org (public repos). Used by Kaniko in the dev local agent."
              username: "${DOCKERHUB_USERNAME}"
              password: "${DOCKERHUB_TOKEN}"
          - file:
              scope: GLOBAL
              id: "dockerhub-config-json"
              description: "Docker Hub config.json for Kaniko. Base64-encoded content via DOCKERHUB_CONFIG_B64 (no file mount needed)."
              fileName: "config.json"
              secretBytes: "${DOCKERHUB_CONFIG_B64}"
          - string:
              scope: GLOBAL
              id: "sonarqube-token"
              description: "SonarCloud user token. Injected by withSonarQubeEnv('sonarqube')."
              secret: "${SONAR_TOKEN}"
          - string:
              scope: GLOBAL
              id: "slack-webhook"
              description: "Slack Incoming Webhook URL for #ci-alerts."
              secret: "${SLACK_WEBHOOK_URL}"
          - string:
              scope: GLOBAL
              id: "github-pat"
              description: "GitHub PAT with repo:write scope for bump-and-tag.sh --push."
              secret: "${GITHUB_PAT}"

unclassified:
  location:
    url: "${JENKINS_URL:-http://localhost:8080/}"
  sonarGlobalConfiguration:
    installations:
      - name: "sonarqube"
        serverUrl: "${SONAR_HOST_URL:-https://sonarcloud.io}"
        credentialsId: "sonarqube-token"
        triggers:
          skipScmCause: false
          skipUpstreamCause: false
  slackNotifier:
    teamDomain: "${SLACK_TEAM_DOMAIN}"
    tokenCredentialId: "slack-webhook"
    botUser: false
    room: "#ci-alerts"
  mailer:
    # Outlook SMTP. Requires an App Password if MFA is enabled on the account:
    # account.microsoft.com → Security → Advanced security → App passwords
    smtpHost: "${SMTP_HOST:-smtp.office365.com}"
    smtpPort: "${SMTP_PORT:-587}"
    useSsl: false
    useTls: true
    charset: UTF-8
    replyToAddress: "${SMTP_FROM:-Juancamuba@outlook.com}"
    authentication:
      username: "${SMTP_USERNAME:-}"
      password: "${SMTP_PASSWORD:-}"

jobs:
  - script: |
      pipelineJob('circleguard-dev') {
          definition {
              cpsScm {
                  scm {
                      git {
                          remote { url("${GIT_REPO_URL}") }
                          branch("${GIT_BRANCH}")
                      }
                  }
                  scriptPath('jenkins/Jenkinsfile.dev')
              }
          }
      }
  - script: |
      pipelineJob('circleguard-stage') {
          definition {
              cpsScm {
                  scm {
                      git {
                          remote { url("${GIT_REPO_URL}") }
                          branch("${GIT_BRANCH}")
                      }
                  }
                  scriptPath('jenkins/Jenkinsfile.stage')
              }
          }
      }
  - script: |
      pipelineJob('circleguard-master') {
          definition {
              cpsScm {
                  scm {
                      git {
                          remote { url("${GIT_REPO_URL}") }
                          branch("${GIT_BRANCH}")
                      }
                  }
                  scriptPath('jenkins/Jenkinsfile.master')
              }
          }
      }
