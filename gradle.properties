# Spring Boot 3.2.4 manages Testcontainers at 1.19.7, whose bundled docker-java
# requests Docker API /v1.32. Docker Engine 29.x enforces a minimum API of 1.44
# and rejects older versions, breaking every Testcontainers integration test with
# "client version is too old" at DockerClientProviderStrategy. Overriding the
# Spring-managed property forces a Testcontainers (and docker-java) version that
# negotiates the API version with the daemon. Set here (not per-service) so the
# io.spring.dependency-management plugin applies it to every module.
testcontainers.version=1.20.6
