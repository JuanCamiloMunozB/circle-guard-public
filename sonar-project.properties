# SonarQube project settings.
#
# These are read both by the gradle plugin (org.sonarqube applied in build.gradle.kts)
# AND by sonar-scanner if invoked manually outside Gradle. The gradle plugin reads
# its own DSL block first; this file is a fallback for tooling that does not load
# the Gradle DSL.
#
# Required env vars when invoking from Jenkins:
#   SONAR_HOST_URL     - injected by withSonarQubeEnv('sonarqube')
#   SONAR_TOKEN        - injected by withSonarQubeEnv('sonarqube')

sonar.organization=juancamuba
sonar.projectKey=JuanCamiloMunozB_circle-guard-public
sonar.projectName=CircleGuard
sonar.projectVersion=0.1.0

sonar.sources=services
sonar.tests=services
sonar.inclusions=services/**/src/main/java/**/*.java
sonar.test.inclusions=services/**/src/test/java/**/*.java

sonar.java.binaries=services/circleguard-auth-service/build/classes/java/main,\
                    services/circleguard-identity-service/build/classes/java/main,\
                    services/circleguard-form-service/build/classes/java/main,\
                    services/circleguard-promotion-service/build/classes/java/main,\
                    services/circleguard-notification-service/build/classes/java/main,\
                    services/circleguard-dashboard-service/build/classes/java/main,\
                    services/circleguard-gateway-service/build/classes/java/main,\
                    services/circleguard-file-service/build/classes/java/main

sonar.coverage.jacoco.xmlReportPaths=services/circleguard-auth-service/build/reports/jacoco/test/jacocoTestReport.xml,\
                                      services/circleguard-identity-service/build/reports/jacoco/test/jacocoTestReport.xml,\
                                      services/circleguard-form-service/build/reports/jacoco/test/jacocoTestReport.xml,\
                                      services/circleguard-promotion-service/build/reports/jacoco/test/jacocoTestReport.xml,\
                                      services/circleguard-notification-service/build/reports/jacoco/test/jacocoTestReport.xml,\
                                      services/circleguard-dashboard-service/build/reports/jacoco/test/jacocoTestReport.xml,\
                                      services/circleguard-gateway-service/build/reports/jacoco/test/jacocoTestReport.xml,\
                                      services/circleguard-file-service/build/reports/jacoco/test/jacocoTestReport.xml

sonar.coverage.exclusions=**/*Application.java,**/dto/**,**/model/**,**/config/**,**/event/**,**/exception/**,**/SecurityConfig.java

# Tell Jenkins' Sonar plugin to BLOCK the pipeline until SonarQube reports a result
# AND to abort the pipeline if the gate fails. The actual wait is implemented by
# `waitForQualityGate abortPipeline: true` in the Jenkinsfile; this property
# documents the intent.
sonar.qualitygate.wait=true
sonar.qualitygate.timeout=300

sonar.sourceEncoding=UTF-8
