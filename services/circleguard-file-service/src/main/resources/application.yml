# No external dependencies wired in yet; future S3/MinIO config will follow the
# same pattern (Spring relaxed binding for spring.* keys, explicit ${} for the rest).
spring:
  application:
    name: circleguard-file-service

# Placeholder for S3/MinIO configuration if needed later. When uncommented,
# spring.* keys rely on relaxed binding; AWS_*/S3_* keys would need explicit ${} placeholders.
# spring:
#   cloud:
#     aws:
#       s3:
#         endpoint: http://localhost:9000

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics
  endpoint:
    health:
      show-details: always
      probes:
        enabled: true
  metrics:
    tags:
      application: ${spring.application.name}
  tracing:
    sampling:
      probability: ${TRACING_SAMPLING_PROBABILITY:1.0}
  otlp:
    tracing:
      endpoint: ${OTEL_EXPORTER_OTLP_ENDPOINT:http://localhost:4318}/v1/traces

server:
  port: 8085
