# Spring relaxed binding resolves env vars like SPRING_DATASOURCE_URL onto
# spring.datasource.url automatically — no ${} placeholders needed for spring.*.
# Local-dev defaults are intentionally non-productive.
spring:
  application:
    name: circleguard-identity-service
  mvc:
    problemdetails:
      enabled: true
  datasource:
    url: jdbc:postgresql://localhost:5432/circleguard_identity
    username: admin
    password: dev-only-not-for-prod
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

# Non-spring custom keys with explicit placeholders.
# VAULT_HASH_SALT lives in k8s/configmap.yaml; VAULT_SECRET and VAULT_SALT are
# pending in circleguard-secrets (flagged to Ops — see external-configuration.md §7).
vault:
  secret: ${VAULT_SECRET:dev-only-vault-secret-not-for-prod-do-not-use-pls}
  salt: ${VAULT_SALT:dev-only-salt-deadbeef}
  hash-salt: ${VAULT_HASH_SALT:dev-only-hash-salt-12345678}

jwt:
  secret: ${JWT_SECRET:dev-only-jwt-secret-do-not-use-in-prod-32chars}

server:
  port: 8083
