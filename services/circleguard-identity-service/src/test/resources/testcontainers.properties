# Force EnvironmentAndSystemPropertyClientProviderStrategy so that Testcontainers
# reads DOCKER_HOST and DOCKER_API_VERSION from the environment variables injected
# by the Gradle integrationTest task (build.gradle.kts) and the Jenkins pipeline
# environment block (Jenkinsfile.dev).
#
# Without a forced strategy, Testcontainers 1.19.x auto-detects and may prefer
# DockerDesktopClientProviderStrategy or UnixSocketClientProviderStrategy first.
# Both bypass DOCKER_API_VERSION, causing docker-java 3.3.x to default to API 1.41,
# which Docker Desktop 4.61 / Engine 29.x rejects (minimum supported API is 1.44).
#
# EnvironmentAndSystemPropertyClientProviderStrategy delegates to
# DefaultDockerClientConfig.createDefaultConfigBuilder(), which reads both
# DOCKER_HOST and DOCKER_API_VERSION from the environment (and JVM system
# properties), guaranteeing API 1.44 is used for every container operation.
docker.client.strategy=org.testcontainers.dockerclient.EnvironmentAndSystemPropertyClientProviderStrategy
