# Force EnvironmentAndSystemPropertyClientProviderStrategy so that Testcontainers
# reads DOCKER_HOST from the environment variables injected by the Gradle
# integrationTest task (build.gradle.kts) and the Jenkins pipeline environment
# block (Jenkinsfile.dev).
#
# Without a forced strategy, Testcontainers auto-detects and may prefer
# DockerDesktopClientProviderStrategy or UnixSocketClientProviderStrategy first,
# which can point at a different socket than the one the pipeline expects.
#
# EnvironmentAndSystemPropertyClientProviderStrategy delegates to
# DefaultDockerClientConfig.createDefaultConfigBuilder(), which reads DOCKER_HOST
# from the environment (and JVM system properties). The Docker API version is
# negotiated with the daemon by docker-java (Testcontainers 1.20.x), so it adapts
# to Engine 29.x (minimum API 1.44) automatically.
docker.client.strategy=org.testcontainers.dockerclient.EnvironmentAndSystemPropertyClientProviderStrategy
