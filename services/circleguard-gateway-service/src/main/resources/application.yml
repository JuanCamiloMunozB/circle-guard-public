# Spring relaxed binding resolves env vars (SPRING_DATA_REDIS_HOST,
# SPRING_DATA_REDIS_PORT) onto the corresponding properties.
spring:
  application:
    name: circleguard-gateway-service
  data:
    redis:
      host: localhost
      port: 6379

# Non-spring custom keys with explicit placeholders matching k8s/configmap.yaml + circleguard-secrets.
jwt:
  secret: ${JWT_SECRET:dev-only-jwt-secret-do-not-use-in-prod-32chars}
  expiration: ${JWT_EXPIRATION:3600000}

qr:
  secret: ${QR_SECRET:dev-only-qr-secret-do-not-use-in-prod-32chars}
  expiration: ${QR_EXPIRATION:300}

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics
  endpoint:
    health:
      show-details: always
      probes:
        enabled: true
  metrics:
    tags:
      application: ${spring.application.name}
  tracing:
    sampling:
      probability: ${TRACING_SAMPLING_PROBABILITY:1.0}
  otlp:
    tracing:
      endpoint: ${OTEL_EXPORTER_OTLP_ENDPOINT:http://localhost:4318}/v1/traces

server:
  port: 8087
