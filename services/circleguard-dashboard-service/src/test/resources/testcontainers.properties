# Use a custom strategy that explicitly sets docker-java API version 1.44.
#
# Root cause: ALL built-in Testcontainers 1.19.x strategies call
# DefaultDockerClientConfig.createDefaultConfigBuilder(), which hardcodes
# API 1.41 as the default. createDefaultConfigBuilder() never reads
# DOCKER_API_VERSION from the environment — only fromEnv() does.
# Docker Desktop 4.61 / Engine 29.x enforces a minimum of 1.44, rejecting
# every /v1.41/... request with "client version 1.41 is too old."
#
# Setting DOCKER_API_VERSION=1.44 as an env var or JVM system property has no
# effect on the built-in strategies because they never call fromEnv().
#
# DockerEngine29Strategy.getConfig() calls:
#   DefaultDockerClientConfig.createDefaultConfigBuilder()
#       .withDockerHost(DOCKER_HOST or unix:///var/run/docker.sock)
#       .withApiVersion(RemoteApiVersion.parseConfig("1.44"))
#       .build();
# This guarantees /v1.44/... is used for every docker-java request,
# satisfying the Docker Desktop 4.61 / Engine 29.x minimum.
docker.client.strategy=com.circleguard.dashboard.testinfra.DockerEngine29Strategy
