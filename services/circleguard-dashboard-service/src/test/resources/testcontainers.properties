# Do NOT force docker.client.strategy here.
#
# With DOCKER_HOST=unix:///var/run/docker.sock and DOCKER_API_VERSION=1.41 set
# explicitly in the Gradle integrationTest task (build.gradle.kts), Testcontainers
# will use EnvironmentAndSystemPropertyClientProviderStrategy automatically.
# That strategy properly passes DOCKER_HOST and DOCKER_API_VERSION to docker-java,
# which skips version negotiation (avoiding failures against Docker Desktop Engine 25+).
#
# Previously this file forced UnixSocketClientProviderStrategy, which bypasses the
# environment variables and uses its own socket connection — ignoring DOCKER_API_VERSION.
