# Spring relaxed binding resolves env vars (SPRING_KAFKA_BOOTSTRAP_SERVERS,
# SPRING_MAIL_HOST, SPRING_MAIL_PORT) onto the corresponding properties.
spring:
  application:
    name: circleguard-notification-service
  kafka:
    bootstrap-servers: localhost:9092
    consumer:
      group-id: notification-group
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer
  mail:
    host: localhost
    port: 25
    properties:
      mail:
        smtp:
          auth: false
          starttls:
            enable: false

# Non-spring custom keys with explicit placeholders matching k8s/configmap.yaml + circleguard-secrets.
auth:
  api:
    url: ${AUTH_API_URL:http://localhost:8180}

jwt:
  secret: ${JWT_SECRET:dev-only-jwt-secret-do-not-use-in-prod-32chars}
  expiration: ${JWT_EXPIRATION:3600000}

qr:
  secret: ${QR_SECRET:dev-only-qr-secret-do-not-use-in-prod-32chars}
  expiration: ${QR_EXPIRATION:300}

feature:
  sms-alerts:
    enabled: ${FEATURE_SMS_ALERTS_ENABLED:false}

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics
  endpoint:
    health:
      show-details: always
      probes:
        enabled: true
  metrics:
    tags:
      application: ${spring.application.name}
  tracing:
    sampling:
      probability: ${TRACING_SAMPLING_PROBABILITY:1.0}
  otlp:
    tracing:
      endpoint: ${OTEL_EXPORTER_OTLP_ENDPOINT:http://localhost:4318}/v1/traces

server:
  port: 8082
