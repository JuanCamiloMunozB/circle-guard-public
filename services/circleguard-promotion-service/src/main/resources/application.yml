# Spring relaxed binding resolves env vars (SPRING_DATASOURCE_URL,
# SPRING_NEO4J_URI, SPRING_NEO4J_AUTHENTICATION_USERNAME, SPRING_NEO4J_AUTHENTICATION_PASSWORD,
# SPRING_KAFKA_BOOTSTRAP_SERVERS, SPRING_DATA_REDIS_HOST, SPRING_DATA_REDIS_PORT)
# onto the corresponding properties below.
spring:
  application:
    name: circleguard-promotion-service
  datasource:
    url: jdbc:postgresql://localhost:5432/circleguard_promotion
    username: admin
    password: dev-only-not-for-prod
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  neo4j:
    uri: bolt://localhost:7687
    authentication:
      username: neo4j
      password: dev-only-neo4j-not-for-prod
  kafka:
    bootstrap-servers: localhost:9092
    consumer:
      group-id: promotion-service-group
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: "*"
  data:
    redis:
      host: localhost
      port: 6379

# Non-spring custom keys with explicit placeholders.
jwt:
  secret: ${JWT_SECRET:dev-only-jwt-secret-do-not-use-in-prod-32chars}
  expiration: ${JWT_EXPIRATION:3600000}

server:
  port: 8088
