# Spring relaxed binding resolves env vars like SPRING_DATASOURCE_URL onto
# spring.datasource.url automatically — no ${} placeholders needed below.
# Values in this file are LOCAL-DEV DEFAULTS, intentionally non-productive.
# In Kubernetes they are overridden by k8s/configmap.yaml + circleguard-secrets,
# plus SPRING_DATASOURCE_URL declared as env on this service's Deployment.
spring:
  application:
    name: circleguard-auth-service
  datasource:
    url: jdbc:postgresql://localhost:5432/circleguard_auth
    username: admin
    password: dev-only-not-for-prod
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  ldap:
    urls: ldap://localhost:389
    base: dc=circleguard,dc=edu
    username: cn=admin,dc=circleguard,dc=edu
    password: dev-only-ldap-not-for-prod

# Non-spring custom keys: relaxed binding does NOT apply, so explicit
# placeholders are required. Names match k8s/configmap.yaml + circleguard-secrets.
jwt:
  secret: ${JWT_SECRET:dev-only-jwt-secret-do-not-use-in-prod-32chars}
  expiration: ${JWT_EXPIRATION:3600000}

qr:
  secret: ${QR_SECRET:dev-only-qr-secret-do-not-use-in-prod-32chars}
  expiration: ${QR_EXPIRATION:300}

server:
  port: 8180
